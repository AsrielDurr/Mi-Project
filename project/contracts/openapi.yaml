openapi: 3.1.0
info:
  title: AI Course Selection Shared API
  version: 1.0.0
  description: Shared HTTP contract for recommendation, enrollment, waitlist recomputation, and trace modules.
servers:
  - url: http://localhost:8000
paths:
  /api/recommend:
    post:
      operationId: recommendCourses
      tags: [recommendation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
      responses:
        '200':
          description: MiMo or fallback recommendations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/enroll:
    post:
      operationId: enrollCourse
      tags: [enrollment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentRequest'
      responses:
        '200':
          description: Deterministic enrollment decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentDecision'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/StateConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/student/status:
    get:
      operationId: getStudentStatus
      tags: [enrollment]
      parameters:
        - in: query
          name: student_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current enrollment and waitlist state for one student.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentStatusResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/admin/course-status:
    get:
      operationId: getCourseStatus
      tags: [waitlist]
      parameters:
        - in: query
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current capacity, enrollment, and waitlist state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseStatusResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/admin/release-seat:
    post:
      operationId: releaseSeat
      tags: [waitlist]
      description: Increase the course capacity by exactly one seat.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCommandRequest'
      responses:
        '200':
          description: One seat released by increasing capacity by one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseSeatResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/StateConflictError'
  /api/admin/recompute-waitlist:
    post:
      operationId: recomputeWaitlist
      tags: [waitlist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCommandRequest'
      responses:
        '200':
          description: Ordered eligibility recheck and promotion result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecomputeResult'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/StateConflictError'
  /api/trace/{trace_id}:
    get:
      operationId: getTrace
      tags: [trace]
      parameters:
        - in: path
          name: trace_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Time-ordered trace events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/demo/reset:
    post:
      operationId: resetDemoScenario
      tags: [demo]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoResetRequest'
      responses:
        '200':
          description: Seed state restored for one fixed scenario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoResetResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
components:
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Student, course, trace, or scenario was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StateConflictError:
      description: Current state does not allow the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Schedule:
      type: object
      additionalProperties: false
      required: [day, start, end]
      properties:
        day:
          type: string
          enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
        start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
        end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
    StudentProfile:
      type: object
      additionalProperties: false
      required: [student_id, goal, skills, available_times, completed_course_ids, enrolled_course_ids]
      properties:
        student_id:
          type: string
          minLength: 1
        goal:
          type: string
          minLength: 1
        skills:
          type: array
          items: {type: string}
          uniqueItems: true
        available_times:
          type: array
          items: {type: string}
          uniqueItems: true
        completed_course_ids:
          type: array
          items: {type: string}
          uniqueItems: true
        enrolled_course_ids:
          type: array
          items: {type: string}
          uniqueItems: true
    Course:
      type: object
      additionalProperties: false
      required: [course_id, name, description, schedule, capacity, enrolled_count, prerequisite_ids, status]
      properties:
        course_id: {type: string, minLength: 1}
        name: {type: string, minLength: 1}
        description: {type: string}
        schedule:
          $ref: '#/components/schemas/Schedule'
        capacity: {type: integer, minimum: 0}
        enrolled_count: {type: integer, minimum: 0}
        prerequisite_ids:
          type: array
          items: {type: string}
          uniqueItems: true
        status:
          type: string
          enum: [OPEN, CANCELLED]
    Recommendation:
      type: object
      additionalProperties: false
      required: [course_id, score, reason, uncertainty]
      properties:
        course_id: {type: string, minLength: 1}
        course_name: {type: string}
        score: {type: integer, minimum: 0, maximum: 100}
        reason: {type: string, minLength: 1}
        uncertainty: {type: string}
    RecommendRequest:
      type: object
      additionalProperties: false
      required: [student]
      properties:
        student:
          $ref: '#/components/schemas/StudentProfile'
    RecommendationResponse:
      type: object
      additionalProperties: false
      required: [trace_id, source, model, prompt_version, fallback_reason, recommendations]
      properties:
        trace_id: {type: string, minLength: 1}
        source:
          type: string
          enum: [MODEL, FALLBACK]
        model:
          type: [string, 'null']
        prompt_version: {type: string, minLength: 1}
        fallback_reason:
          type: [string, 'null']
        recommendations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Recommendation'
    RuleCheckResult:
      type: object
      additionalProperties: false
      required: [rule, passed, reason, related_course_id]
      properties:
        rule:
          type: string
          enum: [DUPLICATE, PREREQUISITE, TIME_CONFLICT]
        passed: {type: boolean}
        reason: {type: string, minLength: 1}
        related_course_id:
          type: [string, 'null']
    EnrollmentRequest:
      type: object
      additionalProperties: false
      required: [student_id, course_id]
      properties:
        student_id: {type: string, minLength: 1}
        course_id: {type: string, minLength: 1}
        recommendation_trace_id:
          type: [string, 'null']
    EnrollmentDecision:
      type: object
      additionalProperties: false
      required: [trace_id, student_id, course_id, rule_decision, capacity_available, status, waitlist_position, checks]
      properties:
        trace_id: {type: string, minLength: 1}
        student_id: {type: string, minLength: 1}
        course_id: {type: string, minLength: 1}
        course_name: {type: string}
        rule_decision:
          type: string
          enum: [PASS, BLOCK]
        capacity_available: {type: boolean}
        status:
          type: string
          enum: [ENROLLED, WAITLISTED, REJECTED]
        waitlist_position:
          type: [integer, 'null']
          minimum: 1
        checks:
          type: array
          items:
            $ref: '#/components/schemas/RuleCheckResult'
    EnrollmentSummary:
      type: object
      additionalProperties: false
      required: [course_id, status]
      properties:
        course_id: {type: string}
        status:
          type: string
          enum: [ENROLLED, WAITLISTED, REJECTED]
    WaitlistEntry:
      type: object
      additionalProperties: false
      required: [student_id, course_id, position, applied_at, status, last_check_reason]
      properties:
        student_id: {type: string, minLength: 1}
        course_id: {type: string, minLength: 1}
        position: {type: integer, minimum: 1}
        applied_at: {type: string, format: date-time}
        status:
          type: string
          enum: [WAITING, PROMOTED, SKIPPED]
        last_check_reason:
          type: [string, 'null']
    StudentStatusResponse:
      type: object
      additionalProperties: false
      required: [student_id, enrollments, waitlist_entries]
      properties:
        student_id: {type: string}
        enrollments:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentSummary'
        waitlist_entries:
          type: array
          items:
            $ref: '#/components/schemas/WaitlistEntry'
    CourseStatusResponse:
      type: object
      additionalProperties: false
      required: [course, available_seats, enrolled_student_ids, waitlist]
      properties:
        course:
          $ref: '#/components/schemas/Course'
        available_seats: {type: integer, minimum: 0}
        enrolled_student_ids:
          type: array
          items: {type: string}
        waitlist:
          type: array
          items:
            $ref: '#/components/schemas/WaitlistEntry'
    CourseCommandRequest:
      type: object
      additionalProperties: false
      required: [course_id]
      properties:
        course_id: {type: string, minLength: 1}
    ReleaseSeatResponse:
      type: object
      additionalProperties: false
      required: [trace_id, course_id, capacity_before, capacity_after, enrolled_count, available_seats]
      properties:
        trace_id: {type: string}
        course_id: {type: string}
        capacity_before: {type: integer, minimum: 0}
        capacity_after: {type: integer, minimum: 0}
        enrolled_count: {type: integer, minimum: 0}
        available_seats: {type: integer, minimum: 0}
    RecomputeCheck:
      type: object
      additionalProperties: false
      required: [student_id, waitlist_status, reason]
      properties:
        student_id: {type: string}
        waitlist_status:
          type: string
          enum: [PROMOTED, SKIPPED]
        reason: {type: string}
    RecomputeResult:
      type: object
      additionalProperties: false
      required: [trace_id, course_id, available_seats_before, checked, promoted_student_ids]
      properties:
        trace_id: {type: string}
        course_id: {type: string}
        available_seats_before: {type: integer, minimum: 0}
        checked:
          type: array
          items:
            $ref: '#/components/schemas/RecomputeCheck'
        promoted_student_ids:
          type: array
          items: {type: string}
          uniqueItems: true
    TraceEvent:
      type: object
      additionalProperties: false
      required: [event_id, trace_id, event_type, actor, payload, created_at]
      properties:
        event_id: {type: string}
        trace_id: {type: string}
        event_type: {type: string}
        actor:
          type: string
          enum: [STUDENT, TEACHER, SYSTEM, MODEL]
        payload: {type: object}
        created_at: {type: string, format: date-time}
    TraceResponse:
      type: object
      additionalProperties: false
      required: [trace_id, events]
      properties:
        trace_id: {type: string}
        events:
          type: array
          items:
            $ref: '#/components/schemas/TraceEvent'
    DemoResetRequest:
      type: object
      additionalProperties: false
      required: [scenario_id]
      properties:
        scenario_id: {type: string, minLength: 1}
    DemoResetResponse:
      type: object
      additionalProperties: false
      required: [trace_id, scenario_id, course_ids, student_ids]
      properties:
        trace_id: {type: string}
        scenario_id: {type: string}
        course_ids:
          type: array
          items: {type: string}
        student_ids:
          type: array
          items: {type: string}
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, trace_id]
          properties:
            code:
              type: string
              enum: [VALIDATION_ERROR, STUDENT_NOT_FOUND, COURSE_NOT_FOUND, MODEL_ERROR, STATE_CONFLICT, INTERNAL_ERROR]
            message: {type: string, minLength: 1}
            trace_id:
              type: [string, 'null']

